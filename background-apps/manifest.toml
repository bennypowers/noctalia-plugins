id           = "bennypowers/background-apps"
name         = "Background Apps"
version      = "2.0.0"
min_noctalia = "5.0.0"
author       = "bennypowers"
license      = "GPL-3.0"
description  = "Display Freedesktop background apps in the bar"
tags         = ["background", "apps", "flatpak", "portal"]

[[setting]]
key         = "updateInterval"
type        = "int"
label       = "Update Interval (ms)"
description = "How often to check for background apps"
default     = 3000
min         = 1000
max         = 30000

[[widget]]
id    = "apps"
entry = "widget.luau"

[[panel]]
id        = "list"
entry     = "panel.luau"
width     = 350
height    = 400
placement = "attached"
